spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/consultorio_medico}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    dev.marcosmoreira.consultorio: DEBUG
