name: consultorio-medico-local

services:
  postgres-farmacia:
    image: postgres:16-bookworm
    container_name: consultorio-medico-postgres-farmacia
    environment:
      POSTGRES_DB: farmacia_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farmacia_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - farmacia_postgres_data:/var/lib/postgresql/data
      - ../../database-farmacia/V2/schema/V2_3FN.sql:/docker-entrypoint-initdb.d/01_V2_3FN.sql:ro
      - ../../database-farmacia/V2/schema/V2_1_backend_extension.sql:/docker-entrypoint-initdb.d/02_V2_1_backend_extension.sql:ro
      - ../../database-farmacia/V2/seeds/02_seed_demo_3FN.sql:/docker-entrypoint-initdb.d/03_seed_demo_3FN.sql:ro
      - ../../database-farmacia/V2/seeds/03_seed_backend_extension.sql:/docker-entrypoint-initdb.d/04_seed_backend_extension.sql:ro

  backend-farmacia:
    container_name: consultorio-medico-backend-farmacia
    build:
      context: ../../backend-farmacia
      dockerfile: Dockerfile.dev
    environment:
      APP_ENV: docker-local
      APP_PORT: 3001
      API_PREFIX: api/v1
      SWAGGER_PATH: docs
      PUBLIC_BASE_URL: http://localhost:3001
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      JWT_SECRET: CAMBIAR_EN_DOCKER_LOCAL
      JWT_EXPIRES_IN: 1d
      DB_HOST: postgres-farmacia
      DB_PORT: 5432
      DB_NAME: farmacia_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SCHEMA: farmacia
      DB_SYNC: "false"
      DB_LOGGING: "false"
      STORAGE_ROOT: ./storage
      MEDIA_BASE_URL: http://localhost:3001/media
      MAX_FILE_SIZE_MB: 5
    depends_on:
      postgres-farmacia:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    ports:
      - "3001:3001"
    volumes:
      - ../../backend-farmacia:/app
      - backend_farmacia_node_modules:/app/node_modules
      - ../../backend-farmacia/storage:/app/storage

  storefront-farmacia:
    container_name: consultorio-medico-storefront-farmacia
    build:
      context: ../../storefront-farmacia-angular
      dockerfile: Dockerfile.dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NG_CLI_ANALYTICS: "false"
    depends_on:
      backend-farmacia:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4200').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 30s
    ports:
      - "4200:4200"
    volumes:
      - ../../storefront-farmacia-angular:/app
      - storefront_farmacia_node_modules:/app/node_modules

volumes:
  farmacia_postgres_data:
  backend_farmacia_node_modules:
  storefront_farmacia_node_modules:
