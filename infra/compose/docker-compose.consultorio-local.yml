services:
  postgres-consultorio:
    image: postgres:16-bookworm
    container_name: consultorio-medico-postgres-consultorio
    environment:
      POSTGRES_DB: consultorio_medico
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_consultorio_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d consultorio_medico']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres_consultorio_data:
