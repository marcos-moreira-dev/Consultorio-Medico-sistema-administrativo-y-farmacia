<nav class="pagination" aria-label="Paginación" *ngIf="totalPages > 1">
  <button
    class="button button--ghost pagination__nav"
    type="button"
    [disabled]="!hasPreviousPage"
    (click)="emitPage(page - 1)"
  >
    Anterior
  </button>

  <div class="pagination__pages" aria-label="Páginas disponibles">
    <ng-container *ngFor="let token of tokens(); trackBy: trackByToken">
      <span class="pagination__ellipsis" *ngIf="isEllipsis(token)">…</span>

      <button
        *ngIf="!isEllipsis(token)"
        class="pagination__page"
        type="button"
        [class.is-active]="isCurrent(token)"
        [attr.aria-current]="isCurrent(token) ? 'page' : null"
        (click)="emitToken(token)"
      >
        {{ token }}
      </button>
    </ng-container>
  </div>

  <button
    class="button button--ghost pagination__nav"
    type="button"
    [disabled]="!hasNextPage"
    (click)="emitPage(page + 1)"
  >
    Siguiente
  </button>
</nav>
